<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notícia — Portal OlimpIF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .noticia-page{max-width:720px}
    .noticia-page__capa{width:100%;max-height:420px;object-fit:cover;border-radius:var(--raio);margin-bottom:32px}
    .noticia-page__data{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--vermelho);margin-bottom:12px;display:block}
    .noticia-page__titulo{font-family:var(--fonte-display);font-weight:900;font-size:2.4rem;line-height:1.05;margin-bottom:16px}
    .noticia-page__resumo{font-size:1.05rem;color:var(--texto-suave);font-weight:300;line-height:1.65;margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid var(--cinza-borda)}
    .noticia-page__conteudo{font-size:0.98rem;line-height:1.9;color:#333;white-space:pre-wrap}
    .noticia-page__voltar{display:inline-flex;align-items:center;gap:6px;font-size:0.82rem;font-weight:700;color:var(--verde-escuro);text-decoration:none;margin-bottom:28px}
    .noticia-page__voltar svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  </style>
  <link rel="icon" href="data:,">
  <link rel="icon" href="data:,">
</head>
<body data-pagina="noticias.html">
  <div id="aside-container"></div>
  <div class="main">
    <div id="topbar-container"></div>
    <div class="content noticia-page" id="noticia-conteudo"><p style="color:var(--texto-suave);">Carregando...</p></div>
  </div>
  <script src="js/api-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/noticia.js"></script>
</body>
</html>
