<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olimpíadas IFPI — Galeria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .galeria-grid{columns:3;gap:14px}
    .galeria-item{break-inside:avoid;margin-bottom:14px;position:relative;border-radius:var(--raio);overflow:hidden;cursor:pointer}
    .galeria-item img{width:100%;display:block;transition:transform 0.3s ease}
    .galeria-item:hover img{transform:scale(1.04)}
    .galeria-item__overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 60%);opacity:0;transition:opacity 0.3s ease;display:flex;flex-direction:column;justify-content:flex-end;padding:16px}
    .galeria-item:hover .galeria-item__overlay{opacity:1}
    .galeria-item__titulo{color:#fff;font-weight:700;font-size:0.9rem}
    .galeria-item__data{color:rgba(255,255,255,0.7);font-size:0.75rem}
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
    .lightbox.ativo{display:flex}
    .lightbox__img{max-width:90vw;max-height:85vh;border-radius:8px;object-fit:contain}
    .lightbox__fechar{position:absolute;top:20px;right:28px;color:#fff;font-size:2rem;cursor:pointer;background:none;border:none;line-height:1}
    .lightbox__info{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);text-align:center;color:#fff}
    .lightbox__info strong{display:block;font-size:1rem}
    .lightbox__info span{font-size:0.82rem;color:rgba(255,255,255,0.6)}
    @media(max-width:760px){.galeria-grid{columns:2}}
    @media(max-width:480px){.galeria-grid{columns:1}}
  </style>
  <link rel="icon" href="data:,">
  <link rel="icon" href="data:,">
</head>
<body data-pagina="galeria.html">
  <div id="aside-container"></div>
  <div class="main">
    <div id="topbar-container"></div>
    <div class="content">
      <header class="page-header">
        <span class="page-header__eyebrow">Memórias</span>
        <h1>Galeria</h1>
        <p>Fotos de cerimônias, premiações, viagens e competições.</p>
      </header>
      <form class="filtros" id="filtros-galeria">
        <div class="filtro">
          <label for="filtro-cat-galeria">Categoria</label>
          <select id="filtro-cat-galeria">
            <option value="todos">Todas as categorias</option>
            <option value="cerimonia">Cerimônia</option>
            <option value="premiacao">Premiação</option>
            <option value="viagem">Viagem</option>
            <option value="competicao">Competição</option>
          </select>
        </div>
      </form>
      <div class="galeria-grid" id="galeria-grid"></div>
    </div>
  </div>
  <div class="lightbox" id="lightbox">
    <button class="lightbox__fechar" id="lightbox-fechar">×</button>
    <img class="lightbox__img" id="lightbox-img" src="" alt=""/>
    <div class="lightbox__info"><strong id="lightbox-titulo"></strong><span id="lightbox-data"></span></div>
  </div>
  <script src="js/api-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/galeria.js"></script>
</body>
</html>
